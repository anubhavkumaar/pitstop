# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PITSTOP_SERVICES }}
          channelId: live
          projectId: pitstop-services
      # action-hosting-deploy only ships Hosting, so deploy the security rules
      # (Firestore + Storage) separately with the same service account.
      - name: Deploy Firestore & Storage rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PITSTOP_SERVICES }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools deploy --only firestore:rules,storage --project pitstop-services --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
