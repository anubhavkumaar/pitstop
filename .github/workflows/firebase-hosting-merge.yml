# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PITSTOP_SERVICES }}
          channelId: live
          projectId: pitstop-services
      # action-hosting-deploy only ships Hosting, so deploy the Firestore rules
      # separately with the same service account. NOTE: deliberately NOT deploying
      # storage — Firebase Storage isn't set up on this project, and including it
      # made the whole command fail, so the Firestore rules never deployed. Re-add
      # ",storage" here only after enabling Storage in the Firebase console.
      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PITSTOP_SERVICES }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools deploy --only firestore:rules --project pitstop-services --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
