name: Preview on PR
on: pull_request
permissions:
  contents: read
jobs:
  build_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
      - run: npm install -g firebase-tools
      - run: firebase hosting:channel:deploy pr-${{ github.event.number }} --token "${{ secrets.FIREBASE_TOKEN }}" --project pitstop-services
